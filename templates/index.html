<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Agentic AI Learning Platform (POC)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css" />
    <style>
      :root {
        --page-bg: linear-gradient(145deg, #020617 0%, #0f172a 45%, #111827 100%);
        --panel-bg: rgba(15, 23, 42, 0.94);
        --panel-border: rgba(148, 163, 184, 0.24);
        --muted-text: #94a3b8;
        --strong-text: #e5e7eb;
        --accent: #38bdf8;
        --accent-soft: rgba(56, 189, 248, 0.16);
      }

      * {
        min-width: 0;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(34, 197, 94, 0.14), transparent 28%),
          radial-gradient(circle at 85% 15%, rgba(56, 189, 248, 0.16), transparent 24%),
          var(--page-bg);
        color: var(--strong-text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: clamp(0.85rem, 2vw, 1.5rem);
      }

      .chat-container {
        background:
          linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(2, 6, 23, 0.96)),
          var(--panel-bg);
        border-radius: 1.25rem;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        width: 100%;
        max-width: min(1100px, 100%);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(18px);
      }

      .chat-header {
        padding: 1.2rem 1.4rem;
        border-bottom: 1px solid rgba(148, 163, 184, 0.35);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.18) 0, transparent 38%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
      }

      .chat-header-left {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        flex: 1 1 280px;
      }

      .chat-header-title {
        font-weight: 700;
        font-size: clamp(1rem, 1.5vw, 1.15rem);
        letter-spacing: 0.01em;
      }

      .chat-header-subtitle {
        font-size: 0.82rem;
        color: var(--muted-text);
        margin-top: 0.2rem;
      }

      .chip {
        font-size: 0.7rem;
        padding: 0.32rem 0.65rem;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        color: var(--strong-text);
        background: rgba(15, 23, 42, 0.74);
        white-space: nowrap;
      }

      .header-right {
        display: flex;
        gap: 0.75rem;
        align-items: stretch;
        justify-content: flex-end;
        flex: 1 1 360px;
      }

      .topics-panel {
        flex: 1 1 240px;
        min-width: 220px;
        padding: 0.7rem 0.8rem;
        border-radius: 0.75rem;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(2, 6, 23, 0.45);
      }

      .topics-title {
        font-size: 0.75rem;
        color: var(--muted-text);
        margin-bottom: 0.45rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .topic-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        font-size: 0.75rem;
        padding: 0.26rem 0;
      }

      .topic-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 100%;
      }

      .topic-pct {
        color: var(--strong-text);
        opacity: 0.9;
      }

      .header-chips {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
        align-items: flex-end;
        justify-content: flex-start;
      }

      .chat-body {
        display: flex;
        flex-direction: column;
        height: min(58vh, 640px);
      }

      .messages {
        flex: 1;
        padding: 1.1rem 1.25rem 1.2rem;
        overflow-y: auto;
        scroll-behavior: smooth;
      }

      .message {
        margin-bottom: 0.75rem;
        display: flex;
        gap: 0.5rem;
      }

      .message.user {
        justify-content: flex-end;
      }

      .message.ai {
        justify-content: flex-start;
      }

      .bubble {
        max-width: min(75%, 680px);
        padding: 0.7rem 0.9rem;
        border-radius: 0.95rem;
        font-size: 0.9rem;
        line-height: 1.5;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .bubble.user {
        background: #38bdf8;
        color: #0f172a;
        border-bottom-right-radius: 0.15rem;
      }

      .bubble.ai {
        background: #020617;
        border: 1px solid rgba(148, 163, 184, 0.4);
        border-bottom-left-radius: 0.15rem;
      }

      .bubble.teaching {
        border-color: rgba(56, 189, 248, 0.45);
      }

      .bubble.quiz {
        border-color: rgba(34, 197, 94, 0.45);
      }

      .bubble.evaluation {
        border-color: rgba(251, 191, 36, 0.55);
      }

      .bubble.system {
        border-color: rgba(148, 163, 184, 0.55);
        opacity: 0.95;
      }

      .mcq-buttons {
        display: flex;
        gap: 0.4rem;
        margin-top: 0.35rem;
        justify-content: flex-start;
      }

      .mcq-btn {
        padding: 0.25rem 0.55rem;
        border-radius: 0.5rem;
        border: 1px solid rgba(148, 163, 184, 0.6);
        background: rgba(15, 23, 42, 0.95);
        color: #e5e7eb;
        cursor: pointer;
        font-size: 0.75rem;
      }

      .mcq-btn:hover {
        border-color: #38bdf8;
      }

      .action-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 0.35rem;
      }

      .action-btn {
        padding: 0.25rem 0.55rem;
        border-radius: 0.5rem;
        border: 1px solid rgba(148, 163, 184, 0.6);
        background: rgba(2, 6, 23, 0.85);
        color: #e5e7eb;
        cursor: pointer;
        font-size: 0.75rem;
      }

      .action-btn:hover {
        border-color: #22c55e;
      }

      .learning-card {
        padding: 0.75rem 0.85rem;
      }

      .card-title {
        font-weight: 700;
        font-size: 0.9rem;
        margin-bottom: 0.35rem;
      }

      .card-summary {
        color: #e5e7eb;
        opacity: 0.95;
        margin-bottom: 0.5rem;
      }

      .card-details {
        margin-top: 0.35rem;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 0.6rem;
        padding: 0.35rem 0.5rem;
        background: rgba(15, 23, 42, 0.5);
      }

      .card-details summary {
        cursor: pointer;
        color: #9ca3af;
        font-size: 0.8rem;
        list-style: none;
      }

      .card-details summary::-webkit-details-marker {
        display: none;
      }

      .card-pre {
        margin: 0.45rem 0 0;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.78rem;
        color: #e5e7eb;
      }

      .meta {
        font-size: 0.7rem;
        color: #9ca3af;
        margin-top: 0.1rem;
      }

      .chat-footer {
        padding: 0.95rem 1.25rem 1.1rem;
        border-top: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(15, 23, 42, 0.98);
      }

      .input-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      #messageInput {
        flex: 1;
        min-height: 44px;
        padding: 0.7rem 0.85rem;
        border-radius: 0.8rem;
        border: 1px solid rgba(148, 163, 184, 0.6);
        background: rgba(15, 23, 42, 0.9);
        color: var(--strong-text);
        font-size: 0.9rem;
      }

      #messageInput:focus {
        outline: none;
        border-color: #38bdf8;
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.6);
      }

      #sendButton {
        min-height: 44px;
        padding: 0.7rem 1rem;
        border-radius: 0.8rem;
        border: none;
        background: linear-gradient(135deg, #38bdf8, #22c55e);
        color: #020617;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
      }

      #sendButton:disabled {
        opacity: 0.5;
        cursor: default;
      }

      #sendButton span {
        font-size: 0.9rem;
      }

      .status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.6rem;
        font-size: 0.75rem;
        color: var(--muted-text);
        flex-wrap: wrap;
      }

      .progress-group {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .progress-bar {
        position: relative;
        width: min(220px, 42vw);
        height: 6px;
        border-radius: 999px;
        background: #020617;
        overflow: hidden;
        border: 1px solid rgba(55, 65, 81, 0.9);
      }

      .progress-bar-fill {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 0;
        border-radius: inherit;
        background: linear-gradient(90deg, #22c55e, #38bdf8);
        transition: width 0.25s ease-out;
      }

      .step-pill {
        font-size: 0.7rem;
        padding: 0.18rem 0.55rem;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.7);
        color: #e5e7eb;
      }

      .small-hint {
        font-size: 0.7rem;
        color: #6b7280;
        margin-top: 0.35rem;
        line-height: 1.45;
      }

      @media (max-width: 900px) {
        .chat-header {
          padding: 1rem 1rem 1.1rem;
        }

        .header-right {
          width: 100%;
          justify-content: space-between;
        }

        .chat-body {
          height: min(54vh, 560px);
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 0;
          align-items: stretch;
        }

        .chat-container {
          min-height: 100vh;
          border-radius: 0;
          max-width: 100%;
        }

        .chat-header,
        .chat-footer {
          padding-left: 0.9rem;
          padding-right: 0.9rem;
        }

        .header-right {
          flex-direction: column;
          align-items: stretch;
        }

        .topics-panel {
          min-width: 0;
        }

        .header-chips {
          flex-direction: row;
          flex-wrap: wrap;
          align-items: flex-start;
          justify-content: flex-start;
        }

        .chat-body {
          height: calc(100vh - 260px);
          min-height: 340px;
        }

        .messages {
          padding: 0.95rem 0.9rem 1rem;
        }

        .bubble {
          max-width: 92%;
        }

        .status-row {
          align-items: flex-start;
        }

        .progress-group {
          width: 100%;
          justify-content: space-between;
        }

        .progress-bar {
          flex: 1;
          width: auto;
        }

        .input-row {
          flex-direction: column;
          align-items: stretch;
        }

        #sendButton {
          justify-content: center;
          width: 100%;
        }
      }

      @media (max-width: 420px) {
        .chat-header-title {
          font-size: 0.95rem;
        }

        .chat-header-subtitle,
        .topic-row,
        .small-hint {
          font-size: 0.74rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <div class="chat-header-left">
          <div>
            <div class="chat-header-title">Agentic AI Learning Tutor</div>
            <div class="chat-header-subtitle">POC &middot; FastAPI + LangGraph</div>
          </div>
        </div>
        <div class="header-right">
          <div class="topics-panel">
            <div class="topics-title">Topics &amp; progress</div>
            <div id="topicsList"></div>
          </div>
          <div class="header-chips">
            <span class="chip">Stateful session</span>
            <span class="chip">MCQ mode</span>
          </div>
        </div>
      </div>

      <div class="chat-body">
        <div class="messages" id="messages"></div>
      </div>

      <div class="chat-footer">
        <div class="status-row">
          <div>
            <span id="stepLabel" class="step-pill">Step: intent</span>
          </div>
          <div class="progress-group">
            <span>Progress</span>
            <div class="progress-bar">
              <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <span id="progressText">0%</span>
          </div>
        </div>
        <div class="input-row">
          <input
            id="messageInput"
            type="text"
            autocomplete="off"
            placeholder='Try: "Teach me Dynamic Programming" or type "Explain simpler"'
          />
          <button id="sendButton">
            <span>&#9658;</span>
            Send
          </button>
        </div>
        <div class="small-hint">
          Tip: The tutor will loop through teach → quiz → evaluate → decision and adapt when you struggle.
        </div>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
  </html>
