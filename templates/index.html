<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Agentic AI Learning Platform (POC)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #0f172a, #020617);
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
      }

      .chat-container {
        background: rgba(15, 23, 42, 0.96);
        border-radius: 1rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        width: 100%;
        max-width: 920px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.3);
      }

      .chat-header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid rgba(148, 163, 184, 0.35);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: radial-gradient(circle at top left, #38bdf8 0, transparent 40%);
      }

      .chat-header-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .chat-header-title {
        font-weight: 600;
        font-size: 1rem;
      }

      .chat-header-subtitle {
        font-size: 0.78rem;
        color: #9ca3af;
      }

      .chip {
        font-size: 0.7rem;
        padding: 0.2rem 0.5rem;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        color: #e5e7eb;
        background: rgba(15, 23, 42, 0.85);
      }

      .topics-panel {
        min-width: 220px;
        max-width: 260px;
        padding: 0.5rem 0.65rem;
        border-radius: 0.75rem;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(2, 6, 23, 0.55);
      }

      .topics-title {
        font-size: 0.75rem;
        color: #9ca3af;
        margin-bottom: 0.35rem;
      }

      .topic-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        font-size: 0.75rem;
        padding: 0.2rem 0;
      }

      .topic-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 160px;
      }

      .topic-pct {
        color: #e5e7eb;
        opacity: 0.9;
      }

      .chat-body {
        display: flex;
        flex-direction: column;
        height: 480px;
      }

      .messages {
        flex: 1;
        padding: 1rem 1.25rem;
        overflow-y: auto;
        scroll-behavior: smooth;
      }

      .message {
        margin-bottom: 0.75rem;
        display: flex;
        gap: 0.5rem;
      }

      .message.user {
        justify-content: flex-end;
      }

      .message.ai {
        justify-content: flex-start;
      }

      .bubble {
        max-width: 75%;
        padding: 0.55rem 0.8rem;
        border-radius: 0.8rem;
        font-size: 0.87rem;
        line-height: 1.4;
        white-space: pre-wrap;
      }

      .bubble.user {
        background: #38bdf8;
        color: #0f172a;
        border-bottom-right-radius: 0.15rem;
      }

      .bubble.ai {
        background: #020617;
        border: 1px solid rgba(148, 163, 184, 0.4);
        border-bottom-left-radius: 0.15rem;
      }

      .bubble.teaching {
        border-color: rgba(56, 189, 248, 0.45);
      }

      .bubble.quiz {
        border-color: rgba(34, 197, 94, 0.45);
      }

      .bubble.evaluation {
        border-color: rgba(251, 191, 36, 0.55);
      }

      .bubble.system {
        border-color: rgba(148, 163, 184, 0.55);
        opacity: 0.95;
      }

      .mcq-buttons {
        display: flex;
        gap: 0.4rem;
        margin-top: 0.35rem;
        justify-content: flex-start;
      }

      .mcq-btn {
        padding: 0.25rem 0.55rem;
        border-radius: 0.5rem;
        border: 1px solid rgba(148, 163, 184, 0.6);
        background: rgba(15, 23, 42, 0.95);
        color: #e5e7eb;
        cursor: pointer;
        font-size: 0.75rem;
      }

      .mcq-btn:hover {
        border-color: #38bdf8;
      }

      .action-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 0.35rem;
      }

      .action-btn {
        padding: 0.25rem 0.55rem;
        border-radius: 0.5rem;
        border: 1px solid rgba(148, 163, 184, 0.6);
        background: rgba(2, 6, 23, 0.85);
        color: #e5e7eb;
        cursor: pointer;
        font-size: 0.75rem;
      }

      .action-btn:hover {
        border-color: #22c55e;
      }

      .learning-card {
        padding: 0.75rem 0.85rem;
      }

      .card-title {
        font-weight: 700;
        font-size: 0.9rem;
        margin-bottom: 0.35rem;
      }

      .card-summary {
        color: #e5e7eb;
        opacity: 0.95;
        margin-bottom: 0.5rem;
      }

      .card-details {
        margin-top: 0.35rem;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 0.6rem;
        padding: 0.35rem 0.5rem;
        background: rgba(15, 23, 42, 0.5);
      }

      .card-details summary {
        cursor: pointer;
        color: #9ca3af;
        font-size: 0.8rem;
        list-style: none;
      }

      .card-details summary::-webkit-details-marker {
        display: none;
      }

      .card-pre {
        margin: 0.45rem 0 0;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.78rem;
        color: #e5e7eb;
      }

      .meta {
        font-size: 0.7rem;
        color: #9ca3af;
        margin-top: 0.1rem;
      }

      .chat-footer {
        padding: 0.75rem 1.25rem 1rem;
        border-top: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(15, 23, 42, 0.98);
      }

      .input-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      #messageInput {
        flex: 1;
        padding: 0.55rem 0.75rem;
        border-radius: 0.6rem;
        border: 1px solid rgba(148, 163, 184, 0.6);
        background: rgba(15, 23, 42, 0.9);
        color: #e5e7eb;
        font-size: 0.9rem;
      }

      #messageInput:focus {
        outline: none;
        border-color: #38bdf8;
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.6);
      }

      #sendButton {
        padding: 0.5rem 0.9rem;
        border-radius: 0.6rem;
        border: none;
        background: linear-gradient(135deg, #38bdf8, #22c55e);
        color: #020617;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
      }

      #sendButton:disabled {
        opacity: 0.5;
        cursor: default;
      }

      #sendButton span {
        font-size: 0.9rem;
      }

      .status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.4rem;
        font-size: 0.75rem;
        color: #9ca3af;
      }

      .progress-bar {
        position: relative;
        width: 160px;
        height: 6px;
        border-radius: 999px;
        background: #020617;
        overflow: hidden;
        border: 1px solid rgba(55, 65, 81, 0.9);
      }

      .progress-bar-fill {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 0;
        border-radius: inherit;
        background: linear-gradient(90deg, #22c55e, #38bdf8);
        transition: width 0.25s ease-out;
      }

      .step-pill {
        font-size: 0.7rem;
        padding: 0.18rem 0.55rem;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.7);
        color: #e5e7eb;
      }

      .small-hint {
        font-size: 0.7rem;
        color: #6b7280;
        margin-top: 0.25rem;
      }

      @media (max-width: 640px) {
        .chat-body {
          height: 420px;
        }
        .bubble {
          max-width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <div class="chat-header-left">
          <div>
            <div class="chat-header-title">Agentic AI Learning Tutor</div>
            <div class="chat-header-subtitle">POC &middot; FastAPI + LangGraph</div>
          </div>
        </div>
        <div style="display: flex; gap: 0.6rem; align-items: flex-start">
          <div class="topics-panel">
            <div class="topics-title">Topics &amp; progress</div>
            <div id="topicsList"></div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 0.4rem; align-items: flex-end">
            <span class="chip">Stateful session</span>
            <span class="chip">MCQ mode</span>
          </div>
        </div>
      </div>

      <div class="chat-body">
        <div class="messages" id="messages"></div>
      </div>

      <div class="chat-footer">
        <div class="status-row">
          <div>
            <span id="stepLabel" class="step-pill">Step: intent</span>
          </div>
          <div style="display: flex; align-items: center; gap: 0.45rem">
            <span>Progress</span>
            <div class="progress-bar">
              <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <span id="progressText">0%</span>
          </div>
        </div>
        <div class="input-row">
          <input
            id="messageInput"
            type="text"
            autocomplete="off"
            placeholder='Try: "Teach me Dynamic Programming" or type "Explain simpler"'
          />
          <button id="sendButton">
            <span>&#9658;</span>
            Send
          </button>
        </div>
        <div class="small-hint">
          Tip: The tutor will loop through teach → quiz → evaluate → decision and adapt when you struggle.
        </div>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
  </html>
